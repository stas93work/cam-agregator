name: Auto Update Models
on:
  schedule:
    - cron: '5,20,35,50 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - run: python parser.py
      - name: Commit and Push
        run: |
          git config --global user.name 'AI-Bot'
          git config --global user.email 'bot@ai-system.com'
          git add models.json
          git commit -m "Update models" || echo "No changes to commit"
          git push origin main
